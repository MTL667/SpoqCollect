# Agent Customization
# Customize any section below - all are optional

# Override agent name
agent:
  metadata:
    name: ""

# Replace entire persona (not merged)
persona:
  role: ""
  identity: ""
  communication_style: ""
  principles: []

# Add custom critical actions (appended after standard config loading)
critical_actions: []

# Add persistent memories for the agent
memories:
  - "InventariSpoq — asset/Odoo-domeinuitbreiding (2026-03): bij PRD-, epic- en backlogwerk altijd _bmad-output/planning-artifacts/asset-uitbreiding-brand-veiligheid-odoo.md en _bmad/_memory/domain-assets-odoo-integration.md meenemen (assets→subassets→diensten→Odoo; triggers SESSION_START/ON_SCAN/SESSION_END/SESSION_END_NON_DOMESTIC/SESSION_END_IF_NO_ATEX)."

# Add custom menu items (appended to base menu)
# Don't include * prefix or help/exit - auto-injected
menu: []
# Example:
# menu:
#   - trigger: my-workflow
#     workflow: "{project-root}/custom/my.yaml"
#     description: My custom workflow

# Add custom prompts (for action="#id" handlers)
prompts: []
# Example:
# prompts:
# - id: my-prompt
#   content: |
#     Prompt instructions here
